<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7F77DD"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </linearGradient>
  </defs>

  <g transform="translate(256, 230) scale(2.2)">
    <!-- Left bracket -->
    <rect x="-95" y="-48" width="9" height="64" rx="4" fill="url(#accent)" opacity="0.9"/>
    <rect x="-95" y="-48" width="26" height="9" rx="4" fill="url(#accent)" opacity="0.9"/>
    <rect x="-95" y="7" width="26" height="9" rx="4" fill="url(#accent)" opacity="0.9"/>

    <!-- Token blocks row 1 -->
    <rect x="-59" y="-54" width="36" height="16" rx="4" fill="#7F77DD" opacity="0.35"/>
    <rect x="-17" y="-54" width="46" height="16" rx="4" fill="#534AB7" opacity="0.55"/>
    <rect x="35" y="-54" width="28" height="16" rx="4" fill="#7F77DD" opacity="0.25"/>

    <!-- Token blocks row 2 -->
    <rect x="-59" y="-30" width="50" height="16" rx="4" fill="#1D9E75" opacity="0.5"/>
    <rect x="-3" y="-30" width="34" height="16" rx="4" fill="#5DCAA5" opacity="0.4"/>
    <rect x="37" y="-30" width="40" height="16" rx="4" fill="#0F6E56" opacity="0.5"/>

    <!-- Token blocks row 3 -->
    <rect x="-59" y="-6" width="30" height="16" rx="4" fill="#534AB7" opacity="0.45"/>
    <rect x="-23" y="-6" width="54" height="16" rx="4" fill="#7F77DD" opacity="0.3"/>
    <rect x="37" y="-6" width="24" height="16" rx="4" fill="#1D9E75" opacity="0.4"/>

    <!-- Right bracket -->
    <rect x="86" y="-48" width="9" height="64" rx="4" fill="url(#accent)" opacity="0.9"/>
    <rect x="69" y="-48" width="26" height="9" rx="4" fill="url(#accent)" opacity="0.9"/>
    <rect x="69" y="7" width="26" height="9" rx="4" fill="url(#accent)" opacity="0.9"/>

    <!-- Connecting dots flowing down -->
    <circle cx="-10" cy="32" r="3" fill="#7F77DD" opacity="0.55"/>
    <circle cx="0" cy="40" r="2.5" fill="#5DCAA5" opacity="0.45"/>
    <circle cx="10" cy="46" r="2" fill="#7F77DD" opacity="0.35"/>

    <!-- Thought circle -->
    <circle cx="0" cy="82" r="34" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="82" r="25" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.35"/>

    <!-- Neural nodes -->
    <circle cx="-12" cy="72" r="3.2" fill="#7F77DD" opacity="0.7"/>
    <circle cx="10" cy="68" r="3.2" fill="#5DCAA5" opacity="0.7"/>
    <circle cx="16" cy="88" r="3.2" fill="#534AB7" opacity="0.7"/>
    <circle cx="-4" cy="96" r="3.2" fill="#1D9E75" opacity="0.7"/>
    <circle cx="-18" cy="85" r="3.2" fill="#5DCAA5" opacity="0.5"/>

    <!-- Neural connections -->
    <line x1="-12" y1="72" x2="10" y2="68" stroke="#7F77DD" stroke-width="0.8" opacity="0.5"/>
    <line x1="10" y1="68" x2="16" y2="88" stroke="#5DCAA5" stroke-width="0.8" opacity="0.5"/>
    <line x1="16" y1="88" x2="-4" y2="96" stroke="#534AB7" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4" y1="96" x2="-12" y2="72" stroke="#1D9E75" stroke-width="0.8" opacity="0.5"/>
    <line x1="-18" y1="85" x2="10" y2="68" stroke="#7F77DD" stroke-width="0.6" opacity="0.35"/>
    <line x1="-18" y1="85" x2="16" y2="88" stroke="#5DCAA5" stroke-width="0.6" opacity="0.35"/>
  </g>
</svg>